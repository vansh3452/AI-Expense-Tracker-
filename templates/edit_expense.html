{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-white">
                    <h4 class="mb-0">Edit Expense</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input class="form-control" name="amount" value="{{ expense.amount }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-control" name="category" required>
                                <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                                <option value="Groceries" {% if expense.category == 'Groceries' %}selected{% endif %}>Groceries</option>
                                <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                                <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                                <option value="Health" {% if expense.category == 'Health' %}selected{% endif %}>Health</option>
                                <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
                                <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                                <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3">{{ expense.description or '' }}</textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Update Expense</button>
                        <a href="{{ url_for('expenses.view_expenses') }}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
